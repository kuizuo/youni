name: Release native app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile

      - name: Build Android APK
        working-directory: apps/native
        run: bunx eas-cli@latest build --platform android --profile preview --non-interactive --wait --json > "$RUNNER_TEMP/android-build.json"

      - name: Build iOS Simulator app
        working-directory: apps/native
        run: bunx eas-cli@latest build --platform ios --profile ios-simulator --non-interactive --wait --json > "$RUNNER_TEMP/ios-build.json"

      - name: Download build files
        run: |
          version="${GITHUB_REF_NAME#v}"
          android_url="$(jq -r 'if type == "array" then .[0] else . end | .artifacts.applicationArchiveUrl' "$RUNNER_TEMP/android-build.json")"
          ios_url="$(jq -r 'if type == "array" then .[0] else . end | .artifacts.applicationArchiveUrl' "$RUNNER_TEMP/ios-build.json")"
          curl --fail --location "$android_url" --output "youni-android.apk"
          curl --fail --location "$ios_url" --output "youni-${version}-ios-simulator.tar.gz"

      - name: Publish app update
        working-directory: apps/native
        run: bunx eas-cli@latest update --channel production --environment production --message "$GITHUB_REF_NAME" --non-interactive

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" youni-android.apk youni-*-ios-simulator.tar.gz --clobber
